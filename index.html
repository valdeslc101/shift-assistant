<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Assistant - Registro Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librerías para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }
        .card { background: white; border: 1px solid #cbd5e1; padding: 1rem; margin-bottom: 1rem; }
        .card-header { background-color: #e2e8f0; padding: 0.5rem; font-weight: bold; font-size: 0.9rem; border-bottom: 1px solid #cbd5e1; margin: -1rem -1rem 1rem -1rem; color: #1e293b; text-transform: uppercase; letter-spacing: 0.05em; }
        input, select, textarea { border: 1px solid #94a3b8; padding: 0.25rem 0.5rem; width: 100%; font-size: 0.75rem; background-color: #fff; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #0f172a; }
        label { font-size: 0.75rem; font-weight: 600; color: #334155; margin-bottom: 0.1rem; display: block; }
        table th { background-color: #f8fafc; border: 1px solid #cbd5e1; padding: 0.4rem; font-size: 0.75rem; }
        table td { border: 1px solid #cbd5e1; padding: 0.4rem; }
        /* Estilos para el modal de PDF */
        #pdfModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        #pdfModal.active {
            display: flex;
        }
        #pdfContent {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
            max-height: 90vh;
            overflow: auto;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            width: 100%;
        }
        #pdfLoading {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #1e293b;
            padding: 40px;
        }
    </style>
</head>
<body class="p-4 max-w-7xl mx-auto text-gray-900">

    <div class="flex justify-between items-center mb-4 border-b border-gray-300 pb-2">
        <div>
            <h1 class="text-xl font-bold uppercase tracking-wider text-slate-800">Shift Assistant // Reporte Operativo</h1>
        </div>
        <div class="space-x-2">
            <button onclick="loadPreviousShift()" class="text-xs bg-slate-200 border border-slate-400 px-3 py-1 hover:bg-slate-300 transition">Duplicar Turno Anterior</button>
            <button onclick="clearForm()" class="text-xs bg-red-100 text-red-800 border border-red-300 px-3 py-1 hover:bg-red-200 transition">Limpiar Todo</button>
        </div>
    </div>

    <form id="shiftForm" class="space-y-4">
        <!-- HEADER -->
        <div class="card grid grid-cols-2 md:grid-cols-4 gap-4">
            <div><label>Fecha</label><input type="date" id="fecha" required></div>
            <div>
                <label>Turno</label>
                <select id="turno"><option value="AM">AM (06:00 - 18:00)</option><option value="PM">PM (18:00 - 06:00)</option></select>
            </div>
            <div>
                <label>Entrega</label>
                <select id="entrega" required>
                    <option value="">Seleccione...</option><option value="Jenry Fonseca">Jenry Fonseca</option>
                    <option value="Mario Orellano">Mario Orellano</option><option value="Luis Valdes">Luis Valdes</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>
            <div>
                <label>Recibe</label>
                <select id="recibe" required>
                    <option value="">Seleccione...</option><option value="Jenry Fonseca">Jenry Fonseca</option>
                    <option value="Mario Orellano">Mario Orellano</option><option value="Luis Valdes">Luis Valdes</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>
        </div>

        <!-- 1. PRODUCCIÓN & TIEMPOS MUERTOS -->
        <div class="card">
            <div class="card-header">1. PARÁMETROS DE PRODUCCIÓN, LÍNEAS Y TIEMPOS MUERTOS</div>
            <div id="productionContainer" class="grid grid-cols-1 gap-4"></div>
        </div>

        <!-- 2. TAREAS Y GESTIÓN -->
        <div class="card">
            <div class="flex justify-between items-center bg-slate-200 p-2 mb-3 -mx-4 -mt-4 border-b border-slate-300">
                <div class="font-bold text-sm text-slate-800 tracking-wider">2. GESTIÓN OPERATIVA (TAREAS)</div>
                <button type="button" onclick="addTask()" class="bg-slate-700 text-white px-2 py-1 text-xs hover:bg-slate-800 transition">+ Nueva Tarea</button>
            </div>
            <div id="tasksContainer" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
        </div>

        <!-- 3. NOVEDADES -->
        <div class="card">
            <div class="flex justify-between items-center bg-slate-200 p-2 mb-3 -mx-4 -mt-4 border-b border-slate-300">
                <div class="font-bold text-sm text-slate-800 tracking-wider">3. NOVEDADES REPORTADAS</div>
                <button type="button" onclick="addUpdate()" class="bg-slate-700 text-white px-2 py-1 text-xs hover:bg-slate-800 transition">+ Novedad</button>
            </div>
            <div id="updatesContainer" class="space-y-2"></div>
        </div>

        <!-- BOTONES -->
        <div class="flex justify-end mt-4 mb-8 gap-3">
            <button type="button" onclick="generatePDF()" class="bg-green-700 text-white px-6 py-3 text-sm font-bold tracking-wider hover:bg-green-800 transition shadow">
                GENERAR PDF
            </button>
            <button type="button" onclick="generateHandover()" class="bg-blue-800 text-white px-6 py-3 text-sm font-bold tracking-wider hover:bg-blue-900 transition shadow">
                ENVIAR VIA OUTLOOK
            </button>
        </div>
    </form>

    <!-- MODAL PARA PDF -->
    <div id="pdfModal">
        <div id="pdfContent">
            <div id="pdfLoading">Generando PDF, espere...</div>
        </div>
    </div>

    <script>
        const PROCESSES = ['Saponificación', 'S6000', 'S10000', 'S15000', 'Blanqueo'];
        const ENGINEERS = ['Jenry Fonseca', 'Mario Orellano', 'Luis Valdes', 'Otro'];
        const RESPONSABLES = ['Equipo Interno', 'Patio Tanque', 'Mecánico', 'Eléctrico', 'Automatizador', 'Locativo', 'Metrólogo', 'Calidad', 'Acabados', 'Logística', 'Múltidisciplinar'];
        const PRIORITIES = ['Alta', 'Media', 'Baja'];
        const STATUSES = ['Pendiente', 'En proceso', 'On-hold', 'Completado', 'Cancelado']; // <-- Cambio de estado

        document.addEventListener("DOMContentLoaded", () => {
            initDefaultValues();
            renderProductionSections();
            loadDraft(); 
            document.getElementById('shiftForm').addEventListener('change', saveDraft);
            document.getElementById('shiftForm').addEventListener('keyup', saveDraft);
            
            // Filtro dinámico mutuo para los selectores de Entrega y Recibe
            const selEntrega = document.getElementById('entrega');
            const selRecibe = document.getElementById('recibe');
            
            function filterEngineers() {
                const valEntrega = selEntrega.value;
                const valRecibe = selRecibe.value;
                
                Array.from(selEntrega.options).forEach(opt => {
                    if (opt.value === valRecibe && opt.value !== "" && opt.value !== "Otro") {
                        opt.style.display = 'none';
                    } else {
                        opt.style.display = '';
                    }
                });
                
                Array.from(selRecibe.options).forEach(opt => {
                    if (opt.value === valEntrega && opt.value !== "" && opt.value !== "Otro") {
                        opt.style.display = 'none';
                    } else {
                        opt.style.display = '';
                    }
                });
            }

            selEntrega.addEventListener('change', filterEngineers);
            selRecibe.addEventListener('change', filterEngineers);
            filterEngineers();
        });

        function initDefaultValues() {
            const now = new Date();
            document.getElementById('fecha').value = now.toISOString().split('T')[0];
            const hour = now.getHours();
            document.getElementById('turno').value = (hour >= 6 && hour < 18) ? 'AM' : 'PM';
        }

        // Tiempos muertos base HTML integrados por línea
        function getDowntimeHtml(procId) {
            return `
            <div class="mt-3 border-t border-slate-300 pt-2 bg-slate-50 p-2">
                <div class="flex justify-between items-center mb-1">
                    <label class="font-bold text-xs text-slate-800 mb-0">Tiempos Muertos / Fallas Críticas</label>
                    <button type="button" onclick="addDowntime('${procId}')" class="bg-slate-700 text-white px-2 py-0.5 text-[10px] hover:bg-slate-800 transition shadow">+ Falla</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-[10px] text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-200">
                                <th class="w-1/6 border border-slate-300 p-1">Equipo</th>
                                <th class="w-16 border border-slate-300 p-1">Inicio</th>
                                <th class="w-16 border border-slate-300 p-1">Fin</th>
                                <th class="w-12 border border-slate-300 p-1">Min</th>
                                <th class="w-1/4 border border-slate-300 p-1">Causa</th>
                                <th class="border border-slate-300 p-1">Acción realizada</th>
                                <th class="w-6 border border-slate-300 p-1"></th>
                            </tr>
                        </thead>
                        <tbody id="dt-body-${procId}"></tbody>
                    </table>
                </div>
            </div>`;
        }

        function renderProductionSections() {
            const container = document.getElementById('productionContainer');
            container.innerHTML = '';
            PROCESSES.forEach(proc => {
                const procId = proc.replace(/\s+/g, '');
                
                if(proc === 'Saponificación') {
                    container.innerHTML += `
                    <div class="border border-slate-300 p-2 bg-white" data-process="${proc}">
                        <div class="flex justify-between items-start mb-2 border-b border-slate-300 pb-2 bg-slate-50 p-1">
                            <div>
                                <h3 class="font-bold text-sm text-slate-800 mb-1">${proc} (Preparación)</h3>
                                <div class="flex gap-2 items-center">
                                    <label class="mb-0 text-xs text-slate-600">Estado:</label>
                                    <select class="prod-estado w-32"><option>Operando</option><option>Detenido</option><option>No programada</option></select>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-5 gap-2">
                            <div class="border border-slate-200 p-2 bg-white"><label>Fondo 1 (Nivel/Contenido)</label><input type="text" class="sap-f1" placeholder="Ej: 80% Base Blanca">
                                <select class="sap-a1 mt-1"><option>OK </option><option>En uso</option><option>Requiere Formular</option><option>Requiere Reformular</option></select></div>
                            <div class="border border-slate-200 p-2 bg-white"><label>Fondo 2 (Nivel/Contenido)</label><input type="text" class="sap-f2" placeholder="Ej: Vacío">
                                <select class="sap-a2 mt-1"><option>OK </option><option>En uso</option><option>Requiere Formular</option><option>Requiere Reformular</option></select></div>
                            <div class="border border-slate-200 p-2 bg-white"><label>Fondo 3 (Nivel/Contenido)</label><input type="text" class="sap-f3" placeholder="Ej: 50% Base Color">
                                <select class="sap-a3 mt-1"><option>OK </option><option>En uso</option><option>Requiere Formular</option><option>Requiere Reformular</option></select></div>
                            <div class="border border-slate-200 p-2 bg-white"><label>Blend-4 (Nivel/Contenido)</label><input type="text" class="sap-b4" placeholder="Ej: Nivel o estado...">
                                <select class="sap-ab4 mt-1"><option>OK </option><option>En uso</option><option>Requiere Formular</option><option>Requiere Reformular</option></select></div>
                            <div class="border border-slate-200 p-2 bg-white"><label>Blend-6 (Nivel/Contenido)</label><input type="text" class="sap-b6" placeholder="Ej: Nivel o estado...">
                                <select class="sap-ab6 mt-1"><option>OK </option><option>En uso</option><option>Requiere Formular</option><option>Requiere Reformular</option></select></div>
                        </div>
                        <div class="mt-2">
                            <label>Observaciones (${proc}):</label>
                            <textarea class="prod-obs" maxlength="500" rows="2" placeholder="Novedades específicas del área..."></textarea>
                        </div>
                        ${getDowntimeHtml(procId)}
                    </div>`;
                } else {
                    let checksHTML = "";
                    if(proc === 'S10000') {
                        checksHTML = `
                        <div class="col-span-4 md:col-span-9 flex items-center gap-4 bg-slate-100 p-1 border border-slate-200 text-xs my-1">
                            <span class="font-bold">Trabajando desde:</span>
                            <label class="inline-flex items-center gap-1 mb-0 font-normal"><input type="checkbox" class="chk-s10k" value="blend-4"> blend-4</label>
                            <label class="inline-flex items-center gap-1 mb-0 font-normal"><input type="checkbox" class="chk-s10k" value="blend-6"> blend-6</label>
                        </div>`;
                    } else if(proc === 'S6000') {
                        checksHTML = `
                        <div class="col-span-4 md:col-span-9 flex items-center gap-4 bg-slate-100 p-1 border border-slate-200 text-xs my-1">
                            <span class="font-bold">Alimentando de:</span>
                            <label class="inline-flex items-center gap-1 mb-0 font-normal"><input type="checkbox" class="chk-s6k" value="fondo 1"> fondo 1</label>
                            <label class="inline-flex items-center gap-1 mb-0 font-normal"><input type="checkbox" class="chk-s6k" value="fondo 2"> fondo 2</label>
                            <label class="inline-flex items-center gap-1 mb-0 font-normal"><input type="checkbox" class="chk-s6k" value="fondo 3"> fondo 3</label>
                        </div>`;
                    }

                    container.innerHTML += `
                    <div class="border border-slate-300 p-2 bg-white" data-process="${proc}">
                        <div class="flex justify-between items-start mb-2 border-b border-slate-300 pb-2 bg-slate-50 p-1">
                            <div>
                                <h3 class="font-bold text-sm text-slate-800 mb-1">${proc}</h3>
                                <div class="flex gap-2 items-center">
                                    <label class="mb-0 text-xs text-slate-600">Estado:</label>
                                    <select class="prod-estado w-32"><option>Operando</option><option>Detenido</option><option>Standby</option><option>No programada</option></select>
                                </div>
                            </div>
                            <div>
                                ${['S6000', 'S10000', 'S15000'].includes(proc) ? `
                                <div class="flex gap-1 items-center mt-1">
                                    <label class="mb-0 text-xs">Tolva Empaque:</label>
                                    <select class="prod-empaque w-44 text-xs"><option value="">Seleccione...</option><option value="SACOS_25">SACOS_25</option><option value="BB_750">BB_750</option><option value="BB_900">BB_900</option></select>
                                </div>` : ''}
                            </div>
                        </div>
                        ${checksHTML}
                        <div class="grid grid-cols-4 md:grid-cols-9 gap-1">
                            <div class="col-span-2"><label>Producto</label><input type="text" class="prod-prod"></div>
                            <div><label>Lote</label><input type="text" class="prod-lotes"></div>
                            <div><label>Flujo</label><input type="text" class="prod-flujo"></div>
                            <div><label>Presión</label><input type="text" class="prod-presion"></div>
                            <div><label>Vacío</label><input type="text" class="prod-vacio"></div>
                            <div><label>T. Camisas</label><input type="text" class="prod-temp"></div>
                            <div><label>Chill. Ent</label><input type="text" class="prod-chillere"></div>
                            <div><label>Chill. Sal</label><input type="text" class="prod-chillerf"></div>
                        </div>
                        <div class="mt-2">
                            <label>Observaciones o Calidad (max 500 carac.):</label>
                            <textarea class="prod-obs" maxlength="500" rows="2" placeholder="Detalles operativos, comportamiento del flujo, etc..."></textarea>
                        </div>
                        ${getDowntimeHtml(procId)}
                    </div>`;
                }
            });
        }

        // Tiempos muertos insertados por línea
        function addDowntime(procId, data = {}) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="p-0.5 border border-slate-300"><input type="text" class="dt-equipo w-full p-1" value="${data.equipo || ''}"></td>
                <td class="p-0.5 border border-slate-300"><input type="time" class="dt-inicio w-full p-1" value="${data.inicio || ''}" onchange="calcDuration(this)"></td>
                <td class="p-0.5 border border-slate-300"><input type="time" class="dt-fin w-full p-1" value="${data.fin || ''}" onchange="calcDuration(this)"></td>
                <td class="p-0.5 border border-slate-300"><input type="number" class="dt-min w-full p-1 bg-slate-100 text-center font-bold" value="${data.minutos || ''}" readonly tabindex="-1"></td>
                <td class="p-0.5 border border-slate-300"><input type="text" class="dt-causa w-full p-1" value="${data.causa || ''}"></td>
                <td class="p-0.5 border border-slate-300"><input type="text" class="dt-accion w-full p-1" value="${data.accion || ''}"></td>
                <td class="p-0.5 border border-slate-300 text-center"><button type="button" onclick="this.closest('tr').remove(); saveDraft();" class="text-red-600 font-bold px-1">X</button></td>
            `;
            document.getElementById(`dt-body-${procId}`).appendChild(tr);
        }

        function calcDuration(el) {
            const row = el.closest('tr');
            const start = row.querySelector('.dt-inicio').value;
            const end = row.querySelector('.dt-fin').value;
            if (start && end) {
                const [h1, m1] = start.split(':').map(Number);
                const [h2, m2] = end.split(':').map(Number);
                let diff = (h2 * 60 + m2) - (h1 * 60 + m1);
                if (diff < 0) diff += 24 * 60;
                row.querySelector('.dt-min').value = diff;
                saveDraft();
            }
        }

        // Semáforo para Estado de la Tarea
        function updateTaskColor(selectEl) {
            const val = selectEl.value;
            selectEl.className = 'tk-estado border p-1 w-full text-xs font-bold transition rounded outline-none ';
            if(val === 'Pendiente') selectEl.classList.add('bg-slate-200', 'text-slate-800');
            else if(val === 'Completado') selectEl.classList.add('bg-green-600', 'text-white', 'border-green-700');
            else if(val === 'Cancelado') selectEl.classList.add('bg-red-600', 'text-white', 'border-red-700');
            else if(val === 'En proceso') selectEl.classList.add('bg-blue-500', 'text-white', 'border-blue-600');
            else if(val === 'On-hold') selectEl.classList.add('bg-orange-400', 'text-white', 'border-orange-500');
            saveDraft();
        }

        function addTask(data = {}) {
            const div = document.createElement('div');
            div.className = "border border-slate-300 p-2 bg-white relative";
            div.innerHTML = `
                <button type="button" onclick="this.parentElement.remove(); saveDraft();" class="absolute top-1 right-2 text-slate-400 hover:text-red-500 font-bold">&times;</button>
                <div class="grid grid-cols-2 gap-2 mb-2 pr-4">
                    <div><label>Proceso/Área</label><select class="tk-proceso">${PROCESSES.map(p => `<option ${data.proceso === p ? 'selected' : ''}>${p}</option>`).join('')}</select></div>
                    <div><label>Prioridad</label><select class="tk-prio">${PRIORITIES.map(p => `<option ${data.prio === p ? 'selected' : ''}>${p}</option>`).join('')}</select></div>
                </div>
                <div class="mb-2"><label>Descripción</label><input type="text" class="tk-desc" value="${data.desc || ''}"></div>
                <div class="grid grid-cols-1 md:grid-cols-5 gap-2 mb-2">
                    <div class="md:col-span-3"><label>Responsable</label><select class="tk-resp">${RESPONSABLES.map(r => `<option ${data.resp === r ? 'selected' : ''}>${r}</option>`).join('')}</select></div>
                    <div class="md:col-span-2"><label>Estado</label><select class="tk-estado" onchange="updateTaskColor(this)">${STATUSES.map(s => `<option ${data.estado === s ? 'selected' : ''}>${s}</option>`).join('')}</select></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label>Acción Inmediata</label><input type="text" class="tk-inmediata" value="${data.inmediata || ''}" placeholder="Acción tomada al momento..."></div>
                    <div><label>Acción Correctiva</label><input type="text" class="tk-correctiva" value="${data.correctiva || ''}" placeholder="Acción de fondo / definitiva..."></div>
                </div>
            `;
            document.getElementById('tasksContainer').appendChild(div);
            // Aplica color inicial
            setTimeout(() => updateTaskColor(div.querySelector('.tk-estado')), 0);
        }

        function addUpdate(data = {}) {
            const tipos = ['Mantenimiento', 'Laboratorio', 'Calidad', 'Seguridad', 'Logística'];
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center border border-slate-300 p-1 bg-white";
            div.innerHTML = `
                <input type="time" class="up-hora w-24" value="${data.hora || ''}">
                <select class="up-tipo w-32">${tipos.map(t => `<option ${data.tipo === t ? 'selected' : ''}>${t}</option>`).join('')}</select>
                <input type="text" class="up-desc flex-1" value="${data.desc || ''}" placeholder="Detalle...">
                <button type="button" onclick="this.parentElement.remove(); saveDraft();" class="text-red-500 font-bold px-2">X</button>
            `;
            document.getElementById('updatesContainer').appendChild(div);
        }

        function getFormData() {
            let data = {
                fecha: document.getElementById('fecha').value, turno: document.getElementById('turno').value,
                entrega: document.getElementById('entrega').value, recibe: document.getElementById('recibe').value,
                produccion: [], tareas: [], novedades: []
            };

            document.querySelectorAll('#productionContainer > div.bg-white').forEach(div => {
                let proc = div.dataset.process;
                let procId = proc.replace(/\s+/g, '');
                
                // Extraer tiempos muertos locales
                let localDowntime = [];
                div.querySelectorAll(`tbody[id="dt-body-${procId}"] tr`).forEach(tr => {
                    localDowntime.push({ 
                        equipo: tr.querySelector('.dt-equipo').value, 
                        inicio: tr.querySelector('.dt-inicio').value, 
                        fin: tr.querySelector('.dt-fin').value, 
                        minutos: tr.querySelector('.dt-min').value, 
                        causa: tr.querySelector('.dt-causa').value, 
                        accion: tr.querySelector('.dt-accion').value 
                    });
                });

                if(proc === 'Saponificación') {
                    data.produccion.push({
                        proceso: proc, estado: div.querySelector('.prod-estado').value,
                        f1: div.querySelector('.sap-f1').value, a1: div.querySelector('.sap-a1').value,
                        f2: div.querySelector('.sap-f2').value, a2: div.querySelector('.sap-a2').value,
                        f3: div.querySelector('.sap-f3').value, a3: div.querySelector('.sap-a3').value,
                        b4: div.querySelector('.sap-b4').value, ab4: div.querySelector('.sap-ab4').value,
                        b6: div.querySelector('.sap-b6').value, ab6: div.querySelector('.sap-ab6').value,
                        obs: div.querySelector('.prod-obs').value,
                        downtime: localDowntime
                    });
                } else {
                    let checks = [];
                    div.querySelectorAll('input[type="checkbox"]:checked').forEach(chk => checks.push(chk.value));
                    let empaqueEl = div.querySelector('.prod-empaque');

        function saveDraft() { localStorage.setItem('shift_draft', JSON.stringify(getFormData())); }

        function loadDraft() { const draft = localStorage.getItem('shift_draft'); if (draft) fillFormFromData(JSON.parse(draft)); }

        function loadPreviousShift() {
            const last = localStorage.getItem('shift_last_sent');
            if (last) {
                let data = JSON.parse(last);
                data.fecha = document.getElementById('fecha').value; 
                data.entrega = data.recibe; data.recibe = "";
                data.tareas = data.tareas.filter(t => t.estado !== 'Completado' && t.estado !== 'Cancelado');
                data.produccion.forEach(p => p.downtime = []); // Limpia tiempos muertos viejos
                data.novedades = [];
                fillFormFromData(data);
                const event = new Event('change');
                document.getElementById('entrega').dispatchEvent(event);
            } else { alert("No hay registro de un turno anterior."); }
        }

        function clearForm() { if(confirm("¿Limpiar todo?")) { localStorage.removeItem('shift_draft'); location.reload(); } }

        function fillFormFromData(data) {
            if(data.fecha) document.getElementById('fecha').value = data.fecha;
            if(data.turno) document.getElementById('turno').value = data.turno;
            if(data.entrega) document.getElementById('entrega').value = data.entrega;
            if(data.recibe) document.getElementById('recibe').value = data.recibe;

            const prods = document.querySelectorAll('#productionContainer > div.bg-white');
            data.produccion.forEach((pData, index) => {
                if(prods[index]) {
                    prods[index].querySelector('.prod-estado').value = pData.estado || 'Operando';
                    if(pData.proceso === 'Saponificación') {
                        prods[index].querySelector('.sap-f1').value = pData.f1 || ''; prods[index].querySelector('.sap-a1').value = pData.a1 || 'OK / En uso';
                        prods[index].querySelector('.sap-f2').value = pData.f2 || ''; prods[index].querySelector('.sap-a2').value = pData.a2 || 'OK / En uso';
                        prods[index].querySelector('.sap-f3').value = pData.f3 || ''; prods[index].querySelector('.sap-a3').value = pData.a3 || 'OK / En uso';
                        prods[index].querySelector('.sap-b4').value = pData.b4 || ''; prods[index].querySelector('.sap-ab4').value = pData.ab4 || 'OK / En uso';
                        prods[index].querySelector('.sap-b6').value = pData.b6 || ''; prods[index].querySelector('.sap-ab6').value = pData.ab6 || 'OK / En uso';
                    } else {
                        let empaqueEl = prods[index].querySelector('.prod-empaque');
                        if(empaqueEl) empaqueEl.value = pData.empaque || '';
                        prods[index].querySelector('.prod-lotes').value = pData.lotes || '';
                        prods[index].querySelector('.prod-prod').value = pData.prod || '';
                        prods[index].querySelector('.prod-flujo').value = pData.flujo || '';
                        prods[index].querySelector('.prod-presion').value = pData.presion || '';
                        prods[index].querySelector('.prod-vacio').value = pData.vacio || '';
                        prods[index].querySelector('.prod-temp').value = pData.temp || '';
                        prods[index].querySelector('.prod-chillere').value = pData.chillere || '';
                        prods[index].querySelector('.prod-chillerf').value = pData.chillerf || '';
                        prods[index].querySelectorAll('input[type="checkbox"]').forEach(chk => {
                            chk.checked = pData.checks && Array.isArray(pData.checks) ? pData.checks.includes(chk.value) : false;
                        });
                    }
                    prods[index].querySelector('.prod-obs').value = pData.obs || '';

                    // Llenar tiempos muertos de esta línea
                    const procId = pData.proceso.replace(/\s+/g, '');
                    const tbody = document.getElementById(`dt-body-${procId}`);
                    if(tbody) tbody.innerHTML = '';
                    if(pData.downtime) {
                        pData.downtime.forEach(dt => addDowntime(procId, dt));
                    }
                }
            });

            document.getElementById('tasksContainer').innerHTML = ''; if(data.tareas) data.tareas.forEach(tk => addTask(tk));
            document.getElementById('updatesContainer').innerHTML = ''; if(data.novedades) data.novedades.forEach(up => addUpdate(up));
            
            const event = new Event('change');
            document.getElementById('entrega').dispatchEvent(event);
        }

        function formatListWithY(items) {
            const cleanItems = items.filter(i => i !== null && i !== undefined && i.toString().trim() !== "");
            if (cleanItems.length === 0) return "";
            if (cleanItems.length === 1) return cleanItems[0];
            const lastItem = cleanItems.pop();
            return cleanItems.join(', ') + ' y ' + lastItem;
        }

            iframe.style.height = '1200px';

            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(bodyHTML);
            iframeDoc.close();

            setTimeout(() => {
                html2canvas(iframeDoc.body, {

                    useCORS: true,
                    allowTaint: true,
                    logging: false,
                    width: 800,
                    height: iframeDoc.body.scrollHeight
                }).then(canvas => {
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');

                    htmlProduccion += `<div style="font-family: Verdana, sans-serif; font-size: 11px; color: #1e293b; text-align: left; margin-bottom: 6px;">${leyenda}</div>`;
                }

                if(p.downtime && p.downtime.length > 0) {
                    let procDowntime = 0;
                    htmlProduccion += `<table style="width: 100%; border-collapse: collapse; font-family: Verdana, sans-serif; font-size: 11px; margin-bottom: 6px; margin-top: 8px;">
                        <tr style="background-color: #f1f5f9; text-align: left;">
                            <th style="padding: 3px; border: 1px solid #cbd5e1;">Falla en Equipo</th>
                            <th style="padding: 3px; border: 1px solid #cbd5e1;">Minutos</th>
                            <th style="padding: 3px; border: 1px solid #cbd5e1;">Causa</th>
                            <th style="padding: 3px; border: 1px solid #cbd5e1;">Acción Tomada</th>
                        </tr>`;
                    p.downtime.forEach(dt => {
                        if(dt.minutos) { procDowntime += parseInt(dt.minutos); globalTotalDowntime += parseInt(dt.minutos); }
                        htmlProduccion += `<tr>
                            <td style="padding: 3px; border: 1px solid #cbd5e1; font-weight: bold;">${dt.equipo}</td>
                            <td style="padding: 3px; border: 1px solid #cbd5e1; color: #dc2626;">${dt.minutos}</td>
                            <td style="padding: 3px; border: 1px solid #cbd5e1;">${dt.causa}</td>
                            <td style="padding: 3px; border: 1px solid #cbd5e1;">${dt.accion}</td>
                        </tr>`;
                    });
                    htmlProduccion += `</table>`;
                    htmlProduccion += `<div style="color: #b91c1c; font-weight: bold; font-size: 11px; margin-bottom: 4px;">Paro total en ${p.proceso}: ${procDowntime} min.</div>`;
                }

                if(p.obs) {
                    htmlProduccion += `<div style="font-family: Verdana, sans-serif; font-size: 11px; color: #475569; background-color: #f1f5f9; padding: 6px; border-left: 3px solid #94a3b8; margin-top: 4px;"><strong>Observaciones:</strong> ${p.obs}</div>`;
                }

                htmlProduccion += `</div></div>`;
            });

            if(globalTotalDowntime > 0) {
                 htmlProduccion += `<div style="margin-top: 5px; text-align: right; color: #b91c1c; font-weight: bold; font-size: 12px; margin-bottom: 8px;">TOTAL PLANTA: ${globalTotalDowntime} min en paro reportado.</div>`;
            }

            let htmlTareas = "";
            if(d.tareas.length > 0) {
                htmlTareas = `<table style="width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px;">
                    <tr style="background-color: #f8fafc; text-align: left;">
                        <th style="padding: 4px; border: 1px solid #cbd5e1;">Área</th>
                        <th style="padding: 4px; border: 1px solid #cbd5e1;">Prioridad</th>
                        <th style="padding: 4px; border: 1px solid #cbd5e1;">Descripción</th>
                        <th style="padding: 4px; border: 1px solid #cbd5e1;">Acciones</th>
                        <th style="padding: 4px; border: 1px solid #cbd5e1;">Resp. / Estado</th>
                    </tr>`;
                d.tareas.forEach(t => {
                    let pColor = t.prio === 'Alta' ? '#dc2626' : (t.prio === 'Media' ? '#d97706' : '#059669');
                    let sStyle = '';
                    if (t.estado === 'Completado') sStyle = 'color: #059669; font-weight: bold; background-color: #ecfdf5;';
                    else if (t.estado === 'Cancelado') sStyle = 'color: #dc2626; font-weight: bold; background-color: #fef2f2;';
                    else if (t.estado === 'On-hold') sStyle = 'color: #d97706; font-weight: bold; background-color: #fffbeb;';
                    else if (t.estado === 'En proceso') sStyle = 'color: #2563eb; font-weight: bold; background-color: #eff6ff;';
                    
                    let accStr = [];
                    if (t.inmediata) accStr.push(`<strong>Inmediata:</strong> ${t.inmediata}`);
                    if (t.correctiva) accStr.push(`<strong>Correctiva:</strong> ${t.correctiva}`);
                    let accionesFormatted = accStr.length > 0 ? accStr.join('<br>') : "[Sin acciones registradas]";

                    htmlTareas += `<tr style="${t.estado === 'Completado' ? 'background-color: #f8fafc;' : ''}">
                        <td style="padding: 4px; border: 1px solid #cbd5e1;">${t.proceso}</td>
                        <td style="padding: 4px; border: 1px solid #cbd5e1; font-weight: bold; color: ${pColor};">${t.prio}</td>
                        <td style="padding: 4px; border: 1px solid #cbd5e1;">${t.desc}</td>
                        <td style="padding: 4px; border: 1px solid #cbd5e1; font-size: 11px;">${accionesFormatted}</td>
                        <td style="padding: 4px; border: 1px solid #cbd5e1; ${sStyle}">${t.resp}<br><strong>(${t.estado})</strong></td>
                    </tr>`;
                });
                htmlTareas += `</table>`;
            } else {
                htmlTareas = `<p style="font-size: 12px; color: #475569;">Sin tareas registradas.</p>`;
            }

            let htmlNovedades = "";
            if(d.novedades.length > 0) {
                htmlNovedades = `<ul style="margin: 0; padding-left: 20px; font-size: 12px;">`;
                d.novedades.forEach(n => {
                    htmlNovedades += `<li style="margin-bottom: 4px;"><strong>[${n.hora}] ${n.tipo}:</strong> ${n.desc}</li>`;
                });
                htmlNovedades += `</ul>`;
            } else {
                htmlNovedades = `<p style="font-size: 12px; color: #475569;">Sin novedades externas.</p>`;
            }

            const subject = `Entrega de Turno - ${d.turno} - ${d.fecha.split('-').reverse().join('/')}`;
            const bodyHTML = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; color: #1e293b; background-color: #ffffff; font-size: 13px;">
    <div style="max-width: 800px; border: 1px solid #94a3b8; padding: 15px;">
        <div style="border-bottom: 2px solid #0f172a; padding-bottom: 10px; margin-bottom: 15px;">
            <h2 style="margin: 0; font-size: 16px; color: #0f172a;">REPORTE DE ENTREGA DE TURNO</h2>
            <div style="margin-top: 5px; font-size: 12px; color: #475569;">
                Fecha: <strong>${d.fecha}</strong> | Turno: <strong>${d.turno}</strong><br>
                Entrega: <strong>${d.entrega}</strong> | Recibe: <strong>${d.recibe}</strong>
            </div>
        </div>
        
        <h3 style="font-size: 13px; background: #e2e8f0; padding: 4px; border: 1px solid #cbd5e1; margin-bottom: 8px;">1. PARÁMETROS DE PRODUCCIÓN Y NOVEDADES TÉCNICAS</h3>
        ${htmlProduccion}

        <h3 style="font-size: 13px; background: #e2e8f0; padding: 4px; border: 1px solid #cbd5e1; margin-top: 20px; margin-bottom: 8px;">2. GESTIÓN OPERATIVA (TAREAS)</h3>
        ${htmlTareas}

        <h3 style="font-size: 13px; background: #e2e8f0; padding: 4px; border: 1px solid #cbd5e1; margin-top: 20px; margin-bottom: 8px;">3. OTRAS NOVEDADES</h3>
        ${htmlNovedades}
    </div>
</body>
</html>`;

            localStorage.setItem('shift_last_sent', JSON.stringify(d));
            localStorage.removeItem('shift_draft'); 

            const boundary = "----=_NextPart_ShiftAssistant_HTML_Mail";
            const emlContent = [
                `To: `,
                `Subject: ${subject}`,
                `X-Unsent: 1`,
                `MIME-Version: 1.0`,
                `Content-Type: multipart/alternative; boundary="${boundary}"`,
                ``,
                `--${boundary}`,
                `Content-Type: text/html; charset="UTF-8"`,
                `Content-Transfer-Encoding: 8bit`,
                ``,
                bodyHTML.trim(),
                ``,
                `--${boundary}--`
            ].join('\r\n');

            const blob = new Blob([emlContent], { type: 'message/rfc822' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${subject}.eml`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
